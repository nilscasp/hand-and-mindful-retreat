<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Hand & Mindful Retreat 2026</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;0,600;1,300;1,400;1,500&family=Josefin+Sans:wght@300;400;600&display=swap" rel="stylesheet">
<style>
/* ============================================================
   RESET & BASE
   ============================================================ */
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html, body { width: 100%; height: 100%; overflow: hidden; }
body { background: #1E1228; }

/* ============================================================
   RETREAT IFRAME (underneath, preloads silently)
   ============================================================ */
#retreatFrame {
  position: fixed;
  inset: 0;
  width: 100%;
  height: 100%;
  border: none;
  z-index: 1;
  opacity: 0;
  transition: opacity 1.4s ease-out;
}
#retreatFrame.visible { opacity: 1; }

/* ============================================================
   MUSIC TOGGLE (appears after gateway opens)
   ============================================================ */
#musicToggle {
  position: fixed;
  bottom: 1.4rem;
  right: 1.4rem;
  z-index: 500;
  background: rgba(255,248,240,0.08);
  border: 1px solid rgba(184,148,62,0.3);
  border-radius: 50%;
  width: 40px;
  height: 40px;
  display: flex;
  align-items: center;
  justify-content: center;
  cursor: pointer;
  opacity: 0;
  pointer-events: none;
  transition: opacity 0.6s ease, background 0.2s, border-color 0.2s;
  color: rgba(232,213,160,0.7);
}
#musicToggle.visible { opacity: 0.45; pointer-events: auto; }
#musicToggle:hover { opacity: 1 !important; background: rgba(184,148,62,0.1); border-color: rgba(184,148,62,0.6); color: #E8D5A0; }
#musicToggle svg { display: block; }
#musicToggle .icon-on, #musicToggle .icon-off { position: absolute; transition: opacity 0.2s; }
#musicToggle .icon-off { opacity: 0; }
#musicToggle.muted .icon-on { opacity: 0; }
#musicToggle.muted .icon-off { opacity: 1; }

/* ============================================================
   GATEWAY OVERLAY
   ============================================================ */
#gateway {
  position: fixed;
  inset: 0;
  z-index: 9999;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  overflow: hidden;
  transition: opacity 0.7s ease-out;
}

/* Dark gradient background */
.gw-bg {
  position: absolute;
  inset: 0;
  background: linear-gradient(160deg, #1E1228 0%, #3D2B50 50%, #2A1A3E 100%);
  transition: opacity 1s ease-out;
}

/* Central golden radial halo behind rings */
.gw-halo {
  position: absolute;
  width: 500px;
  height: 500px;
  top: 50%;
  left: 50%;
  transform: translate(-50%, -50%);
  background: radial-gradient(ellipse 55% 55% at 50% 50%,
    rgba(184,148,62,0.10) 0%,
    rgba(155,126,181,0.07) 40%,
    transparent 70%);
  pointer-events: none;
  transition: opacity 1s ease-out;
}

/* Particle container */
.gw-particles {
  position: absolute;
  inset: 0;
  pointer-events: none;
  overflow: hidden;
  transition: opacity 0.8s ease-out;
}
.particle {
  position: absolute;
  border-radius: 50%;
  background: radial-gradient(circle, #E8D5A0 0%, #B8943E 60%, transparent 100%);
  animation: particleFloat linear infinite;
  pointer-events: none;
}
@keyframes particleFloat {
  0%   { transform: translateY(0) translateX(0) scale(1);   opacity: var(--op-start); }
  50%  { transform: translateY(-45vh) translateX(var(--drift)) scale(0.8); opacity: var(--op-mid); }
  100% { transform: translateY(-95vh) translateX(calc(var(--drift) * 1.5)) scale(0.4); opacity: 0; }
}

/* ============================================================
   LAYOUT: eyebrow, rings, hint
   ============================================================ */
.gw-content {
  position: relative;
  z-index: 2;
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 2.2rem;
  padding: 2rem;
}

.gw-eyebrow {
  font-family: 'Josefin Sans', sans-serif;
  font-size: 0.55rem;
  font-weight: 600;
  letter-spacing: 0.38em;
  text-transform: uppercase;
  color: rgba(232,213,160,0.55);
  text-align: center;
}

/* ============================================================
   RINGS WRAPPER — holds SVG + button centered
   ============================================================ */
.gw-rings-wrap {
  position: relative;
  display: flex;
  align-items: center;
  justify-content: center;
  animation: breathe 6s ease-in-out infinite;
  will-change: transform;
}
@keyframes breathe {
  0%, 100% { transform: scale(1.000); }
  50%       { transform: scale(1.018); }
}

/* ============================================================
   SVG RINGS
   ============================================================ */
.gw-svg {
  display: block;
  width: min(72vw, 380px);
  height: min(72vw, 380px);
  overflow: visible;
}

/* All ring groups rotate around SVG origin (0,0) */
.ring-group {
  transform-box: fill-box;
  transform-origin: center;
  will-change: transform;
}
@keyframes rotCW  { to { transform: rotate( 360deg); } }
@keyframes rotCCW { to { transform: rotate(-360deg); } }

.rg-1 { animation: rotCW  52s linear infinite; }
.rg-2 { animation: rotCCW 41s linear infinite; }
.rg-3 { animation: rotCW  63s linear infinite; }
.rg-4 { animation: rotCCW 47s linear infinite; }
.rg-5 { animation: rotCW  57s linear infinite; }
.rg-6 { animation: rotCCW 34s linear infinite; }

/* ============================================================
   ENTER BUTTON
   ============================================================ */
.gw-btn-wrap {
  position: absolute;
  top: 50%;
  left: 50%;
  transform: translate(-50%, -50%);
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 0.9rem;
}

.gw-btn {
  width: clamp(76px, 20vw, 94px);
  height: clamp(76px, 20vw, 94px);
  border-radius: 50%;
  border: 1px solid rgba(184,148,62,0.55);
  background: radial-gradient(circle, rgba(232,213,160,0.04) 0%, transparent 70%);
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  transition: background 0.4s, border-color 0.4s, box-shadow 0.4s;
  position: relative;
  outline: none;
}
.gw-btn::before {
  content: '';
  position: absolute;
  inset: 6px;
  border-radius: 50%;
  border: 1px solid rgba(184,148,62,0.2);
  transition: border-color 0.4s;
}
.gw-btn:hover {
  border-color: rgba(184,148,62,0.9);
  background: radial-gradient(circle, rgba(232,213,160,0.10) 0%, rgba(184,148,62,0.04) 60%, transparent 100%);
  box-shadow: 0 0 28px rgba(184,148,62,0.22), inset 0 0 18px rgba(184,148,62,0.06);
}
.gw-btn:hover::before { border-color: rgba(184,148,62,0.4); }
.gw-btn:focus-visible { box-shadow: 0 0 0 2px rgba(184,148,62,0.5); }

.gw-btn-label {
  font-family: 'Cormorant Garamond', serif;
  font-style: italic;
  font-size: clamp(0.82rem, 2.5vw, 0.98rem);
  font-weight: 300;
  color: rgba(232,213,160,0.85);
  letter-spacing: 0.04em;
  position: relative;
  z-index: 1;
  pointer-events: none;
  transition: color 0.3s;
}
.gw-btn:hover .gw-btn-label { color: rgba(232,213,160,1); }

.gw-music-hint {
  font-family: 'Josefin Sans', sans-serif;
  font-size: 0.48rem;
  font-weight: 300;
  letter-spacing: 0.3em;
  text-transform: uppercase;
  color: rgba(184,148,62,0.38);
  white-space: nowrap;
}

/* ============================================================
   BOTTOM HINT
   ============================================================ */
.gw-hint {
  font-family: 'Josefin Sans', sans-serif;
  font-size: 0.5rem;
  font-weight: 300;
  letter-spacing: 0.35em;
  text-transform: uppercase;
  color: rgba(232,213,160,0.7);
  text-align: center;
  animation: hintBlink 4s ease-in-out infinite;
}
@keyframes hintBlink {
  0%, 100% { opacity: 0.6; }
  50%       { opacity: 1;   }
}

/* ============================================================
   RING HOVER GLOW (when hovering enter button, parent glows)
   ============================================================ */
.gw-rings-wrap:hover .rg-glow {
  filter: drop-shadow(0 0 3px rgba(184,148,62,0.4));
}
.gw-rings-wrap:hover .gw-halo-inner {
  opacity: 0.18;
}
.gw-halo-inner { transition: opacity 0.4s; }

/* ============================================================
   OPENING ANIMATION STATES
   ============================================================ */
.gw-rings-wrap.opening {
  animation: none;
  transition: transform 1.4s cubic-bezier(0.25, 0.46, 0.45, 0.94),
              opacity 1.1s ease-in 0.35s,
              filter 0.4s ease-out;
}
.gw-rings-wrap.pulse {
  transform: scale(1.07);
  filter: brightness(1.9) drop-shadow(0 0 12px rgba(184,148,62,0.5));
}
.gw-rings-wrap.expand {
  transform: scale(3.2);
  opacity: 0;
  filter: brightness(2.2) drop-shadow(0 0 24px rgba(184,148,62,0.6));
}
#gateway.fading {
  opacity: 0;
  transition: opacity 0.7s ease-out 0.3s;
}

/* ============================================================
   MOBILE ADJUSTMENTS
   ============================================================ */
@media (max-width: 480px) {
  .gw-halo { width: 340px; height: 340px; }
  .gw-content { gap: 1.6rem; }
}
@media (max-height: 600px) {
  .gw-eyebrow { display: none; }
  .gw-hint    { display: none; }
  .gw-content { gap: 0.8rem; }
}
</style>
</head>
<body>

<!-- ============================================================
     MUSIK: Ersetze 'musik.mp3' durch den Pfad zur Audiodatei
     ============================================================ -->
<audio id="bgMusic" loop preload="none">
  <source src="musik.mp3" type="audio/mpeg">
</audio>

<!-- ============================================================
     RETREAT CONTENT (iframe, preloads in background)
     ============================================================ -->
<iframe
  id="retreatFrame"
  src="retreat.html"
  title="Hand & Mindful Retreat 2026 – Inhalt"
  loading="eager"
></iframe>

<!-- ============================================================
     MUSIK-TOGGLE (erscheint nach dem Öffnen)
     ============================================================ -->
<button id="musicToggle" aria-label="Musik pausieren oder fortsetzen" title="Musik">
  <!-- Speaker ON -->
  <svg class="icon-on" width="15" height="15" viewBox="0 0 24 24" fill="none"
       stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
    <polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5"/>
    <path d="M15.54 8.46a5 5 0 0 1 0 7.07"/>
    <path d="M19.07 4.93a10 10 0 0 1 0 14.14" stroke-opacity="0.5"/>
  </svg>
  <!-- Speaker MUTED -->
  <svg class="icon-off" width="15" height="15" viewBox="0 0 24 24" fill="none"
       stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
    <polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5"/>
    <line x1="23" y1="9" x2="17" y2="15"/>
    <line x1="17" y1="9" x2="23" y2="15"/>
  </svg>
</button>

<!-- ============================================================
     GATEWAY OVERLAY
     ============================================================ -->
<div id="gateway" role="dialog" aria-modal="true" aria-label="Willkommen – Tor zum Retreat">

  <!-- Background -->
  <div class="gw-bg"></div>

  <!-- Central glow halo -->
  <div class="gw-halo"></div>

  <!-- Floating particles (filled by JS) -->
  <div class="gw-particles" id="gwParticles"></div>

  <!-- Main content -->
  <div class="gw-content">

    <!-- Top eyebrow -->
    <p class="gw-eyebrow" aria-hidden="true">HAND &amp; MINDFUL &nbsp;·&nbsp; RETREAT 2026</p>

    <!-- Rings + Button -->
    <div class="gw-rings-wrap" id="gwRingsWrap">

      <!-- SVG Rings -->
      <svg class="gw-svg rg-glow" viewBox="-200 -200 400 400"
           xmlns="http://www.w3.org/2000/svg"
           aria-hidden="true" focusable="false">
        <defs>
          <!-- Inner center glow -->
          <radialGradient id="rg-center" cx="50%" cy="50%" r="50%">
            <stop offset="0%"   stop-color="#FEFCFF" stop-opacity="0.18"/>
            <stop offset="40%"  stop-color="#E8D5A0" stop-opacity="0.10"/>
            <stop offset="100%" stop-color="#B8943E" stop-opacity="0"/>
          </radialGradient>
          <!-- Inner fill -->
          <radialGradient id="rg-inner" cx="50%" cy="50%" r="50%">
            <stop offset="0%"   stop-color="#E8D5A0" stop-opacity="0.12"/>
            <stop offset="70%"  stop-color="#B8943E" stop-opacity="0.04"/>
            <stop offset="100%" stop-color="transparent" stop-opacity="0"/>
          </radialGradient>
          <!-- Outer ambient glow (behind all rings) -->
          <radialGradient id="rg-ambient" cx="50%" cy="50%" r="50%">
            <stop offset="0%"   stop-color="#B8943E" stop-opacity="0.08"/>
            <stop offset="55%"  stop-color="#9B7EB5" stop-opacity="0.04"/>
            <stop offset="100%" stop-color="transparent" stop-opacity="0"/>
          </radialGradient>
        </defs>

        <!-- Ambient glow disk (static, behind everything) -->
        <circle r="195" fill="url(#rg-ambient)"/>

        <!-- Soft innermost core -->
        <circle r="22" fill="url(#rg-center)"/>

        <!-- Base circle with inner fill + gold stroke -->
        <circle r="38" fill="url(#rg-inner)" stroke="#B8943E" stroke-width="1"/>

        <!-- Ring 1 — gold-light, thin, fast CW -->
        <g class="ring-group rg-1">
          <circle r="62" fill="none" stroke="#D4AF5A" stroke-width="0.7"/>
          <!-- 4 tiny cardinal dots -->
          <circle cx=" 62" cy="  0" r="1.4" fill="#D4AF5A" opacity="0.6"/>
          <circle cx="-62" cy="  0" r="1.4" fill="#D4AF5A" opacity="0.6"/>
          <circle cx="  0" cy=" 62" r="1.4" fill="#D4AF5A" opacity="0.6"/>
          <circle cx="  0" cy="-62" r="1.4" fill="#D4AF5A" opacity="0.6"/>
        </g>

        <!-- Ring 2 — lavender, very thin, CCW -->
        <g class="ring-group rg-2">
          <circle r="86" fill="none" stroke="#9B7EB5" stroke-width="0.5" stroke-opacity="0.75"/>
        </g>

        <!-- Ring 3 — gold shimmer, medium, slow CW + 8 tick marks -->
        <g class="ring-group rg-3">
          <circle r="110" fill="none" stroke="#E8D5A0" stroke-width="0.8"/>
          <!-- Tick marks at 8 compass points -->
          <line x1="104" y1="0"  x2="110" y2="0"  stroke="#E8D5A0" stroke-width="1" stroke-linecap="round"/>
          <line x1="-104" y1="0"  x2="-110" y2="0"  stroke="#E8D5A0" stroke-width="1" stroke-linecap="round"/>
          <line x1="0"  y1="104" x2="0"  y2="110" stroke="#E8D5A0" stroke-width="1" stroke-linecap="round"/>
          <line x1="0"  y1="-104" x2="0"  y2="-110" stroke="#E8D5A0" stroke-width="1" stroke-linecap="round"/>
          <line x1=" 73.5" y1=" 73.5" x2=" 77.8" y2=" 77.8" stroke="#E8D5A0" stroke-width="0.7" stroke-linecap="round"/>
          <line x1="-73.5" y1=" 73.5" x2="-77.8" y2=" 77.8" stroke="#E8D5A0" stroke-width="0.7" stroke-linecap="round"/>
          <line x1=" 73.5" y1="-73.5" x2=" 77.8" y2="-77.8" stroke="#E8D5A0" stroke-width="0.7" stroke-linecap="round"/>
          <line x1="-73.5" y1="-73.5" x2="-77.8" y2="-77.8" stroke="#E8D5A0" stroke-width="0.7" stroke-linecap="round"/>
        </g>

        <!-- Ring 4 — gold-deep, medium CCW -->
        <g class="ring-group rg-4">
          <circle r="134" fill="none" stroke="#B8943E" stroke-width="0.65" stroke-opacity="0.8"/>
        </g>

        <!-- Ring 5 — lavender-mid, thin CW -->
        <g class="ring-group rg-5">
          <circle r="158" fill="none" stroke="#C9A8D8" stroke-width="0.5" stroke-opacity="0.6"/>
        </g>

        <!-- Ring 6 — outermost, dashed gold, fast CCW -->
        <g class="ring-group rg-6">
          <circle r="178"
                  fill="none"
                  stroke="#B8943E"
                  stroke-width="0.5"
                  stroke-opacity="0.45"
                  stroke-dasharray="4 14"
                  stroke-dashoffset="0"/>
        </g>
      </svg>

      <!-- Enter Button (centered over SVG) -->
      <div class="gw-btn-wrap">
        <button class="gw-btn" id="enterBtn" onclick="openGateway()" aria-label="Retreat betreten">
          <span class="gw-btn-label">Eintreten</span>
        </button>
      </div>

    </div><!-- /gw-rings-wrap -->

    <!-- Bottom hint -->
    <p class="gw-hint" aria-hidden="true">· KLICKE UM EINZUTRETEN ·</p>

  </div><!-- /gw-content -->
</div><!-- /gateway -->


<script>
/* ============================================================
   PARTICLES
   ============================================================ */
(function createParticles() {
  const container = document.getElementById('gwParticles');
  const count = window.innerWidth < 480 ? 22 : 36;
  for (let i = 0; i < count; i++) {
    const el = document.createElement('div');
    el.className = 'particle';
    const size     = Math.random() * 2.2 + 0.8;
    const x        = Math.random() * 100;
    const dur      = (Math.random() * 9 + 7).toFixed(1);
    const delay    = -(Math.random() * 14).toFixed(1);
    const drift    = (Math.random() * 60 - 30).toFixed(0) + 'px';
    const opStart  = (Math.random() * 0.3 + 0.15).toFixed(2);
    const opMid    = (Math.random() * 0.25 + 0.1).toFixed(2);
    el.style.cssText = `
      left:${x}%;
      bottom:-6px;
      width:${size}px;
      height:${size}px;
      --drift:${drift};
      --op-start:${opStart};
      --op-mid:${opMid};
      animation-duration:${dur}s;
      animation-delay:${delay}s;
    `;
    container.appendChild(el);
  }
})();

/* ============================================================
   MUSIC
   ============================================================ */
const music = document.getElementById('bgMusic');
let musicStarted = false;

function startMusic() {
  if (musicStarted) return;
  musicStarted = true;
  music.volume = 0;
  music.play().catch(() => { /* Datei fehlt — kein Fehler im UI */ });
  let v = 0;
  const ti = setInterval(() => {
    v = Math.min(v + 0.025, 0.6);
    music.volume = v;
    if (v >= 0.6) clearInterval(ti);
  }, 50); // ca. 1.2s fade-in
}

// Music toggle
const toggle = document.getElementById('musicToggle');
toggle.addEventListener('click', () => {
  if (music.paused) {
    music.play().catch(() => {});
    toggle.classList.remove('muted');
    toggle.setAttribute('aria-label', 'Musik pausieren');
  } else {
    music.pause();
    toggle.classList.add('muted');
    toggle.setAttribute('aria-label', 'Musik fortsetzen');
  }
});

/* ============================================================
   GATEWAY OPEN ANIMATION
   ============================================================ */
let isOpening = false;

function openGateway() {
  if (isOpening) return;
  isOpening = true;

  const wrap    = document.getElementById('gwRingsWrap');
  const gateway = document.getElementById('gateway');
  const frame   = document.getElementById('retreatFrame');
  const btn     = document.getElementById('enterBtn');

  btn.disabled = true;

  // — Phase 1 (0ms): Inner pulse + brightness surge —
  wrap.classList.add('opening');
  // Force reflow so transition fires cleanly
  void wrap.offsetWidth;
  wrap.classList.add('pulse');

  // Start music immediately on interaction
  startMusic();

  // — Phase 2 (350ms): Expand rings outward + fade —
  setTimeout(() => {
    wrap.classList.remove('pulse');
    void wrap.offsetWidth;
    wrap.classList.add('expand');
  }, 350);

  // — Phase 3 (700ms): Reveal retreat page —
  setTimeout(() => {
    frame.classList.add('visible');
    // Fade gateway background
    gateway.querySelector('.gw-bg').style.opacity    = '0';
    gateway.querySelector('.gw-halo').style.opacity  = '0';
    gateway.querySelector('.gw-particles').style.opacity = '0';
    gateway.querySelector('.gw-content').style.transition = 'opacity 0.6s ease-out';
    gateway.querySelector('.gw-content').style.opacity = '0';
  }, 700);

  // — Phase 4 (1500ms): Fade out entire gateway —
  setTimeout(() => {
    gateway.classList.add('fading');
  }, 1500);

  // — Phase 5 (2300ms): Remove gateway from DOM —
  setTimeout(() => {
    gateway.style.display = 'none';
    document.body.style.overflow = 'auto';
    toggle.classList.add('visible');
    // Allow iframe to receive scroll
    frame.style.pointerEvents = 'auto';
  }, 2300);
}

/* Keyboard: Enter or Space to open gateway */
document.addEventListener('keydown', (e) => {
  if (!isOpening && (e.key === 'Enter' || e.key === ' ')) {
    e.preventDefault();
    openGateway();
  }
});

/* ============================================================
   IFRAME SCROLL — forward wheel events so retreat page scrolls
   ============================================================ */
document.addEventListener('wheel', (e) => {
  if (isOpening && document.getElementById('gateway').style.display === 'none') {
    // gateway gone — iframe handles its own scroll
    return;
  }
}, { passive: true });
</script>
</body>
</html>
